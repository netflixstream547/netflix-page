<!-- SECTION VIDÉO -->
<section class="video-section">
    <div class="section-header">
        <h2>🎬 شاهد الشرح في دقيقتين</h2>
        <p>فيديو توضيحي يشرح كل الخطوات بالتفصيل</p>
    </div>
    
    <div class="video-container">
        <!-- Bordure lumineuse animée -->
        <div class="video-glow"></div>
        
        <!-- Cadre vidéo -->
        <div class="video-frame">
            <div class="video-placeholder" id="videoPlaceholder" onclick="playVideo()">
                <div class="play-icon">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="white">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </div>
                <p>اضغط للمشاهدة</p>
            </div>
            
            <!-- remplacer VIDEO_ID par ta vraie vidéo -->
            <iframe id="videoIframe" 
                    src="" 
                    data-src="https://www.youtube.com/embed/TA_VIDEO_ID?autoplay=1&rel=0" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen 
                    style="display:none;">
            </iframe>
        </div>
    </div>
    
    <!-- Mini-étapes rapides sous la vidéo -->
    <div class="quick-steps">
        <div class="quick-step">
            <span class="qs-icon">1️⃣</span>
            <span>ثبّت الإضافة</span>
        </div>
        <div class="quick-step">
            <span class="qs-icon">2️⃣</span>
            <span>انضم لـ Discord</span>
        </div>
        <div class="quick-step">
            <span class="qs-icon">3️⃣</span>
            <span>أدخل الكود</span>
        </div>
        <div class="quick-step">
            <span class="qs-icon">4️⃣</span>
            <span>شاهد Netflix 🍿</span>
        </div>
    </div>
</section>

<!-- CSS pour la section vidéo -->
<style>
    .video-section {
        max-width: 900px;
        margin: 60px auto;
        padding: 0 20px;
    }
    
    .section-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .section-header h2 {
        font-size: 28px;
        font-weight: 700;
        color: white;
        margin-bottom: 8px;
    }
    
    .section-header p {
        color: #888;
        font-size: 16px;
    }
    
    .video-container {
        position: relative;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        border-radius: 16px;
        overflow: hidden;
        background: #0a0a0a;
    }
    
    /* Effet de lueur animée autour de la vidéo */
    .video-glow {
        position: absolute;
        inset: -3px;
        border-radius: 18px;
        background: linear-gradient(45deg, #E50914, transparent, #E50914, transparent);
        background-size: 400% 400%;
        animation: glowMove 3s ease-in-out infinite;
        z-index: 0;
        opacity: 0.5;
    }
    
    @keyframes glowMove {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }
    
    .video-frame {
        position: relative;
        z-index: 1;
        aspect-ratio: 16/9;
        background: #000;
        border-radius: 14px;
        overflow: hidden;
    }
    
    .video-frame iframe {
        width: 100%;
        height: 100%;
    }
    
    /* Placeholder avec bouton play */
    .video-placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #111 0%, #000 100%);
        cursor: pointer;
        transition: 0.3s;
    }
    
    .video-placeholder:hover {
        background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
    }
    
    .video-placeholder:hover .play-icon {
        transform: scale(1.1);
        filter: drop-shadow(0 0 20px rgba(229, 9, 20, 0.6));
    }
    
    .play-icon {
        transition: 0.3s;
        margin-bottom: 15px;
    }
    
    .video-placeholder p {
        color: #888;
        font-size: 14px;
    }
    
    /* Étapes rapides */
    .quick-steps {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 25px;
    }
    
    .quick-step {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #111;
        border: 1px solid #222;
        border-radius: 50px;
        padding: 10px 20px;
        font-size: 14px;
        color: #ccc;
        transition: 0.3s;
    }
    
    .quick-step:hover {
        border-color: #E50914;
        transform: translateY(-2px);
    }
    
    .qs-icon {
        font-size: 18px;
    }
    
    /* Responsive */
    @media (max-width: 600px) {
        .section-header h2 {
            font-size: 22px;
        }
        
        .quick-steps {
            gap: 10px;
        }
        
        .quick-step {
            padding: 8px 15px;
            font-size: 12px;
        }
        
        .play-icon svg {
            width: 50px;
            height: 50px;
        }
    }
</style>

<!-- Script pour la vidéo -->
<script>
    function playVideo() {
        const placeholder = document.getElementById('videoPlaceholder');
        const iframe = document.getElementById('videoIframe');
        
        // Cacher le placeholder
        placeholder.style.display = 'none';
        
        // Afficher et charger la vidéo
        iframe.style.display = 'block';
        iframe.src = iframe.getAttribute('data-src');
    }
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .page {
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        /* LOGO */
        .logo {
            font-size: 60px;
            font-weight: 900;
            color: #E50914;
            letter-spacing: 10px;
            margin-bottom: 60px;
        }

        /* CARTE CODE */
        .box {
            background: #111111;
            border: 1px solid #1f1f1f;
            border-radius: 12px;
            padding: 30px 25px;
            margin-bottom: 15px;
        }

        .box .icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .box label {
            display: block;
            color: #999;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .box input {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid #2a2a2a;
            color: white;
            font-size: 22px;
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            margin-bottom: 18px;
            font-weight: 500;
        }

        .box input:focus {
            border-bottom-color: #E50914;
        }

        .box input::placeholder {
            color: #3a3a3a;
            letter-spacing: 2px;
            font-size: 15px;
        }

        .box button {
            width: 100%;
            padding: 14px;
            background: #E50914;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
        }

        .box button:hover {
            background: #b20710;
        }

        #msg {
            margin-top: 14px;
            font-size: 13px;
            font-weight: 500;
        }
        .success { color: #46d369; }
        .error { color: #e87c03; }
        .loading { color: #777; }

        /* CARTE DISCORD */
        .discord-box {
            background: #111111;
            border: 1px solid #1f1f1f;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }

        .discord-box .big-text {
            color: white;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .discord-box .small-text {
            color: #777;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .discord-box a {
            display: inline-block;
            background: #5865F2;
            color: white;
            padding: 13px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }

        .discord-box a:hover {
            background: #4752c4;
        }

        .footer {
            color: #333;
            font-size: 11px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="page">

    <div class="logo">NETFLIX</div>

    <!-- CODE -->
    <div class="box">
        <div class="icon">🔐</div>
        <label>Code d'accès</label>
        <input type="text" id="codeInput" placeholder="••••••••••••" maxlength="12" autocomplete="off">
        <button onclick="connect()">Accéder à Netflix</button>
        <div id="msg"></div>
    </div>

    <!-- DISCORD -->
    <div class="discord-box">
        <div class="big-text">Pas de code ?</div>
        <div class="small-text">Rejoins notre serveur Discord pour obtenir ton accès</div>
        <a href="https://discord.gg/TON_LIEN" target="_blank">💬 Rejoindre le Discord</a>
    </div>

    <div class="footer">TON_NOM</div>

</div>

<script>
    var urlParams = new URLSearchParams(window.location.search);
    var urlCode = urlParams.get('code');
    if (urlCode) {
        document.getElementById('codeInput').value = urlCode;
        setTimeout(connect, 500);
    }

    async function connect() {
        var code = document.getElementById('codeInput').value.trim();
        var msg = document.getElementById('msg');

        if (!code) {
            msg.className = 'error';
            msg.textContent = 'Entre un code';
            return;
        }

        msg.className = 'loading';
        msg.textContent = 'Vérification...';

        try {
            var resp = await fetch('https://netflix-server-dj2j.onrender.com/api/get-cookies?code=' + code);
            var data = await resp.json();

            if (!data.success) {
                msg.className = 'error';
                if (data.error.includes('déjà utilisé')) msg.textContent = 'Code déjà utilisé';
                else if (data.error.includes('expiré')) msg.textContent = 'Code expiré, refais /start';
                else if (data.error.includes('autre connexion')) msg.textContent = 'Code lié à un autre appareil';
                else msg.textContent = data.error;
                return;
            }

            data.cookies.forEach(function(c) {
                document.cookie = c.name + '=' + c.value + '; domain=.netflix.com; path=/; secure; SameSite=None';
            });

            msg.className = 'success';
            msg.textContent = 'Connecté ! Redirection...';

            setTimeout(function() {
                window.location.href = 'https://www.netflix.com/browse';
            }, 1500);

        } catch(e) {
            msg.className = 'error';
            msg.textContent = 'Erreur serveur';
        }
    }

    document.getElementById('codeInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') connect();
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Connect</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Logo */
        .logo {
            font-size: 50px;
            font-weight: 800;
            color: #E50914;
            letter-spacing: 8px;
            margin-bottom: 40px;
        }
        
        /* Carte */
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 40px 35px;
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        
        .card h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .card p {
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
        }
        
        /* Input */
        input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 500;
            border: 2px solid #2a2a2a;
            border-radius: 12px;
            background: #111;
            color: white;
            outline: none;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 12px;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #E50914;
        }
        input::placeholder {
            color: #555;
            letter-spacing: 1px;
            font-weight: 400;
            font-size: 15px;
        }
        
        /* Bouton */
        button {
            width: 100%;
            padding: 16px;
            background: #E50914;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: background 0.2s;
        }
        button:hover { background: #b20710; }
        
        /* Message */
        #msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
        }
        .success { color: #4CAF50; }
        .error { color: #ff4444; }
        .loading { color: #ffaa00; }
        
        /* Discord */
        .discord-link {
            margin-top: 30px;
        }
        .discord-link a {
            color: #5865F2;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .discord-link a:hover { text-decoration: underline; }
        
        /* Footer */
        .footer {
            margin-top: 30px;
            color: #444;
            font-size: 12px;
        }
        .footer strong { color: #E50914; }
    </style>
</head>
<body>
    
    <!-- LOGO -->
    <div class="logo">NETFLIX</div>
    
    <!-- CARTE -->
    <div class="card">
        <h2>🍿 Code d'accès</h2>
        <p>Entre le code reçu en message privé</p>
        
        <input type="text" id="codeInput" placeholder="Entrer le code" maxlength="12" autocomplete="off">
        <button onclick="connect()">Se connecter</button>
        
        <div id="msg"></div>
    </div>
    
    <!-- DISCORD -->
    <div class="discord-link">
        <a href="https://discord.gg/TON_LIEN" target="_blank">
            💬 Pas de code ? Rejoins le Discord
        </a>
    </div>
    
    <!-- FOOTER -->
    <div class="footer">
        Développé par <strong>TON_NOM</strong>
    </div>

    <script>
        // Auto-connexion si code dans l'URL
        var urlParams = new URLSearchParams(window.location.search);
        var urlCode = urlParams.get('code');
        if (urlCode) {
            document.getElementById('codeInput').value = urlCode;
            setTimeout(connect, 500);
        }
        
        async function connect() {
            var code = document.getElementById('codeInput').value.trim();
            var msg = document.getElementById('msg');
            
            if (!code) {
                msg.className = 'error';
                msg.textContent = '❌ Entre un code d\'accès';
                return;
            }
            
            msg.className = 'loading';
            msg.textContent = '⏳ Vérification du code...';
            
            try {
                var resp = await fetch('https://netflix-api-hm3u.onrender.com/api/get-cookies?code=' + code);
                var data = await resp.json();
                
                if (!data.success) {
                    msg.className = 'error';
                    if (data.error.includes('déjà utilisé')) {
                        msg.textContent = '❌ Ce code a déjà été utilisé';
                    } else if (data.error.includes('expiré')) {
                        msg.textContent = '❌ Code invalide ou expiré';
                    } else if (data.error.includes('autre connexion')) {
                        msg.textContent = '❌ Ce code est lié à un autre appareil';
                    } else {
                        msg.textContent = '❌ ' + data.error;
                    }
                    return;
                }
                
                data.cookies.forEach(function(c) {
                    document.cookie = c.name + '=' + c.value + '; domain=.netflix.com; path=/; secure; SameSite=None';
                });
                
                msg.className = 'success';
                msg.textContent = '✅ Connecté ! Ouverture de Netflix...';
                
                setTimeout(function() {
                    window.location.href = 'https://www.netflix.com/browse';
                }, 1500);
                
            } catch(e) {
                msg.className = 'error';
                msg.textContent = '❌ Serveur indisponible, réessaie';
            }
        }
        
        document.getElementById('codeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') connect();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Accès</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
        }
        
        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 50px;
        }
        .logo span {
            color: #E50914;
            font-size: 70px;
            font-weight: bold;
            letter-spacing: 8px;
        }
        
        /* Bloc code */
        .code-block {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .code-block label {
            color: #ccc;
            font-size: 14px;
            display: block;
            margin-bottom: 10px;
        }
        .code-block input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            font-size: 18px;
            text-align: center;
            letter-spacing: 3px;
            outline: none;
        }
        .code-block input:focus {
            border-color: #E50914;
        }
        .code-block button {
            width: 100%;
            padding: 14px;
            background: #E50914;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }
        .code-block button:hover {
            background: #c70812;
        }
        #msg {
            margin-top: 12px;
            font-size: 13px;
            text-align: center;
        }
        .success { color: #46d369; }
        .error { color: #e87c03; }
        .loading { color: #aaa; }
        
        /* Bloc Discord */
        .discord-block {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
        }
        .discord-block p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .discord-block h3 {
            color: white;
            font-size: 17px;
            margin-bottom: 15px;
        }
        .discord-btn {
            display: inline-block;
            background: #5865F2;
            color: white;
            padding: 14px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s;
        }
        .discord-btn:hover {
            background: #4752c4;
        }
        
        .footer {
            text-align: center;
            color: #444;
            font-size: 11px;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Logo -->
        <div class="logo">
            <span>NETFLIX</span>
        </div>
        
        <!-- Code -->
        <div class="code-block">
            <label>🔑 Code d'accès</label>
            <input type="text" id="codeInput" placeholder="Entrez votre code" maxlength="12" autocomplete="off">
            <button onclick="connect()">Se connecter</button>
            <div id="msg"></div>
        </div>
        
        <!-- Discord -->
        <div class="discord-block">
            <p>Pas encore de code ?</p>
            <h3>Rejoins notre Discord</h3>
            <a href="https://discord.gg/TON_LIEN" target="_blank" class="discord-btn">
                💬 Accéder au serveur
            </a>
        </div>
        
        <div class="footer">
            TON_NOM © 2026
        </div>
        
    </div>

    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var urlCode = urlParams.get('code');
        if (urlCode) {
            document.getElementById('codeInput').value = urlCode;
            setTimeout(connect, 500);
        }
        
        async function connect() {
            var code = document.getElementById('codeInput').value.trim();
            var msg = document.getElementById('msg');
            
            if (!code) {
                msg.className = 'error';
                msg.textContent = 'Veuillez entrer un code';
                return;
            }
            
            msg.className = 'loading';
            msg.textContent = 'Vérification...';
            
            try {
                var resp = await fetch('https://netflix-api-hm3u.onrender.com/api/get-cookies?code=' + code);
                var data = await resp.json();
                
                if (!data.success) {
                    msg.className = 'error';
                    if (data.error.includes('déjà utilisé')) {
                        msg.textContent = 'Code déjà utilisé';
                    } else if (data.error.includes('expiré')) {
                        msg.textContent = 'Code expiré, refaites /start';
                    } else if (data.error.includes('autre connexion')) {
                        msg.textContent = 'Code lié à un autre appareil';
                    } else {
                        msg.textContent = data.error;
                    }
                    return;
                }
                
                data.cookies.forEach(function(c) {
                    document.cookie = c.name + '=' + c.value + '; domain=.netflix.com; path=/; secure; SameSite=None';
                });
                
                msg.className = 'success';
                msg.textContent = 'Connecté ! Redirection...';
                
                setTimeout(function() {
                    window.location.href = 'https://www.netflix.com/browse';
                }, 1500);
                
            } catch(e) {
                msg.className = 'error';
                msg.textContent = 'Erreur, réessayez';
            }
        }
        
        document.getElementById('codeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') connect();
        });
    </script>
</body>
</html>

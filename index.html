<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {          
            background: #0a0a0a;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .page {
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            font-size: 60px;
            font-weight: 900;
            color: #E50914;
            letter-spacing: 10px;
            margin-bottom: 40px;
        }

        /* ========== SECTION VIDÉO ATTRACTIVE ========== */
        .video-section {
            margin-bottom: 20px;
        }

        .video-header {
            text-align: center;
            margin-bottom: 18px;
        }

        .video-badge {
            display: inline-block;
            background: rgba(229, 9, 20, 0.15);
            color: #E50914;
            border: 1px solid rgba(229, 9, 20, 0.3);
            border-radius: 50px;
            padding: 5px 15px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.4); }
            50% { box-shadow: 0 0 15px 5px rgba(229, 9, 20, 0.1); }
        }

        .video-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .video-header p {
            color: #888;
            font-size: 13px;
        }

        .video-player {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
        }

        .player-glow {
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            background: conic-gradient(from 0deg, #E50914, transparent, #E50914, transparent);
            animation: glowSpin 4s linear infinite;
            z-index: 0;
            opacity: 0.6;
        }

        @keyframes glowSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .player-frame {
            position: relative;
            z-index: 1;
            aspect-ratio: 16/9;
            border-radius: 11px;
            overflow: hidden;
            background: #0a0a0a;
        }

        .player-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            cursor: pointer;
            z-index: 2;
            transition: 0.3s;
        }

        .play-overlay:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        .play-circle {
            width: 65px;
            height: 65px;
            background: #E50914;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.6);
        }

        .play-overlay:hover .play-circle {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(229, 9, 20, 0.9);
        }

        .play-circle svg {
            width: 30px;
            height: 30px;
            margin-left: 4px;
        }

        .play-overlay span {
            color: #ccc;
            font-size: 14px;
            font-weight: 600;
        }

        .mini-steps {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mini-step {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #111;
            border: 1px solid #222;
            border-radius: 50px;
            padding: 8px 16px;
            font-size: 12px;
            color: #ccc;
            transition: 0.3s;
        }

        .mini-step:hover {
            border-color: #E50914;
            transform: translateY(-2px);
        }

        .step-emoji {
            font-size: 16px;
        }

        .arrow {
            color: #E50914;
            font-weight: bold;
            font-size: 16px;
        }
        /* ========== FIN SECTION VIDÉO ========== */

        .box {
            background: #111111;
            border: 1px solid #1f1f1f;
            border-radius: 12px;
            padding: 30px 25px;
            margin-bottom: 15px;
        }

        .box .icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .box label {
            display: block;
            color: #999;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .box input {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid #2a2a2a;
            color: white;
            font-size: 22px;
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            margin-bottom: 18px;
            font-weight: 500;
        }

        .box input:focus {
            border-bottom-color: #E50914;
        }

        .box input::placeholder {
            color: #3a3a3a;
            letter-spacing: 2px;
            font-size: 15px;
        }

        .box button {
            width: 100%;
            padding: 14px;
            background: #E50914;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
        }

        .box button:hover {
            background: #b20710;
        }

        #msg {
            margin-top: 14px;
            font-size: 13px;
            font-weight: 500;
        }
        .success { color: #46d369; }
        .error { color: #e87c03; }
        .loading { color: #777; }

        .discord-box {
            background: #111111;
            border: 1px solid #1f1f1f;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }

        .discord-box .big-text {
            color: white;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .discord-box .small-text {
            color: #777;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .discord-box a {
            display: inline-block;
            background: #5865F2;
            color: white;
            padding: 13px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }

        .discord-box a:hover {
            background: #4752c4;
        }

        .footer {
            color: #333;
            font-size: 11px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="page">

    <div class="logo">NETFLIX</div>

    <!-- SECTION VIDÉO ATTRACTIVE -->
    <div class="video-section">
        <div class="video-header">
            <span class="video-badge">🎬 TUTORIEL</span>
            <h2>Comment ça marche ?</h2>
            <p>Regarde cette courte vidéo pour tout comprendre en 2 minutes</p>
        </div>

        <div class="video-player">
            <div class="player-glow"></div>
            <div class="player-frame">
                <div class="play-overlay" id="playOverlay" onclick="playVideo()">
                    <div class="play-circle">
                        <svg viewBox="0 0 24 24" fill="white">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </div>
                    <span>Voir le tutoriel</span>
                </div>
                <iframe id="tutoVideo"
                        src=""
                        data-src="https://www.youtube.com/embed/TA_VIDEO_ID?autoplay=1&rel=0&modestbranding=1"
                        frameborder="0"
                        allow="autoplay; encrypted-media; picture-in-picture"
                        allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="mini-steps">
            <div class="mini-step"><span class="step-emoji">📥</span><span>Télécharge</span></div>
            <div class="arrow">→</div>
            <div class="mini-step"><span class="step-emoji">🔧</span><span>Installe</span></div>
            <div class="arrow">→</div>
            <div class="mini-step"><span class="step-emoji">💬</span><span>Rejoins Discord</span></div>
            <div class="arrow">→</div>
            <div class="mini-step"><span class="step-emoji">🍿</span><span>Netflix !</span></div>
        </div>
    </div>
    <!-- FIN SECTION VIDÉO -->

    <!-- CODE -->
    <div class="box">
        <div class="icon">🔐</div>
        <label>Code d'accès</label>
        <input type="text" id="codeInput" placeholder="ecrire ici •••••" maxlength="12" autocomplete="off">
        <button onclick="connect()">Accéder à Netflix</button>
        <div id="msg"></div>
    </div>

    <!-- DISCORD -->
    <div class="discord-box">
        <div class="big-text">Pas de code ?</div>
        <div class="small-text">Rejoins notre serveur Discord pour obtenir ton accès</div>
        <a href="https://discord.gg/TON_LIEN" target="_blank">💬 Rejoindre le Discord</a>
    </div>

    <div class="footer">TON_NOM</div>

</div>

<script>
    function playVideo() {
        const overlay = document.getElementById('playOverlay');
        const iframe = document.getElementById('tutoVideo');
        overlay.style.display = 'none';
        iframe.src = iframe.getAttribute('data-src');
    }

    var urlParams = new URLSearchParams(window.location.search);
    var urlCode = urlParams.get('code');
    if (urlCode) {
        document.getElementById('codeInput').value = urlCode;
        setTimeout(connect, 500);
    }

    async function connect() {
        var code = document.getElementById('codeInput').value.trim();
        var msg = document.getElementById('msg');

        if (!code) {
            msg.className = 'error';
            msg.textContent = 'Entre un code';
            return;
        }

        msg.className = 'loading';
        msg.textContent = 'Préparation du serveur...';

        try {
            await fetch('https://netflix-server-l0ci.onrender.com/');
        } catch(e) {}

        await new Promise(r => setTimeout(r, 3000));

        msg.textContent = 'Vérification du code...';

        try {
            var resp = await fetch('https://netflix-server-l0ci.onrender.com/api/get-cookies?code=' + code);
            var data = await resp.json();

            if (!data.success) {
                msg.className = 'error';
                if (data.error.includes('déjà utilisé')) msg.textContent = 'Code déjà utilisé';
                else if (data.error.includes('expiré')) msg.textContent = 'Code expiré, refais /start';
                else if (data.error.includes('autre connexion')) msg.textContent = 'Code lié à un autre appareil';
                else msg.textContent = data.error;
                return;
            }

            data.cookies.forEach(function(c) {
                document.cookie = c.name + '=' + c.value + '; domain=.netflix.com; path=/; secure; SameSite=None';
            });

            msg.className = 'success';
            msg.textContent = 'Connecté ! Redirection...';

            setTimeout(function() {
                window.location.href = 'https://www.netflix.com/browse';
            }, 1500);

        } catch(e) {
            msg.className = 'error';
            msg.textContent = 'Erreur serveur, réessaie';
        }
    }

    document.getElementById('codeInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') connect();
    });
</script>

</body>
</html>
